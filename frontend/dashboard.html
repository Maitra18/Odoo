<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dashboard – Traveloop</title>
<meta name="description" content="Your Traveloop dashboard — upcoming trips, popular destinations, and quick actions."/>
<link rel="stylesheet" href="css/style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="page-wrap">
  <div id="sidebar-mount"></div>
  <main class="main-content page-enter">

    <!-- Top bar -->
    <div class="topbar">
      <div class="topbar-title">
        <h1>Dashboard <span id="wave">👋</span></h1>
        <span class="topbar-sub" id="greeting-sub">Welcome back, let's plan something amazing</span>
      </div>
      <div class="topbar-actions">
        <a href="create-trip.html" class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Trip</a>
      </div>
    </div>

    <!-- Stats row -->
    <div class="grid grid-4 mb-3" id="stats-row">
      <div class="stat-card skeleton" style="height:90px"></div>
      <div class="stat-card skeleton" style="height:90px"></div>
      <div class="stat-card skeleton" style="height:90px"></div>
      <div class="stat-card skeleton" style="height:90px"></div>
    </div>

    <div class="grid grid-2">
      <!-- Recent trips -->
      <div>
        <div class="flex items-center justify-between mb-2">
          <h2>Recent Trips</h2>
          <a href="my-trips.html" class="btn btn-ghost btn-sm">View all <i class="fa-solid fa-arrow-right"></i></a>
        </div>
        <div id="recent-trips" class="flex flex-col gap-1">
          <div class="skeleton" style="height:80px;border-radius:14px"></div>
          <div class="skeleton" style="height:80px;border-radius:14px"></div>
          <div class="skeleton" style="height:80px;border-radius:14px"></div>
        </div>
      </div>

      <!-- Popular destinations -->
      <div>
        <div class="flex items-center justify-between mb-2">
          <h2>Popular Destinations</h2>
          <a href="city-search.html" class="btn btn-ghost btn-sm">Explore <i class="fa-solid fa-arrow-right"></i></a>
        </div>
        <div class="grid grid-2" id="popular-cities" style="gap:.75rem">
          <div class="skeleton" style="height:120px;border-radius:14px"></div>
          <div class="skeleton" style="height:120px;border-radius:14px"></div>
          <div class="skeleton" style="height:120px;border-radius:14px"></div>
          <div class="skeleton" style="height:120px;border-radius:14px"></div>
        </div>
      </div>
    </div>

    <!-- Quick actions -->
    <div class="mt-4">
      <h2 class="mb-2">Quick Actions</h2>
      <div class="grid grid-4">
        <a href="itinerary-builder.html" class="card card-body flex flex-col items-center gap-1" style="cursor:pointer;text-align:center">
          <div style="font-size:2rem">🗺️</div>
          <div style="font-weight:600">Build Itinerary</div>
          <div class="text-muted text-sm">Add stops & activities</div>
        </a>
        <a href="budget.html" class="card card-body flex flex-col items-center gap-1" style="cursor:pointer;text-align:center">
          <div style="font-size:2rem">💰</div>
          <div style="font-weight:600">Track Budget</div>
          <div class="text-muted text-sm">Estimate trip costs</div>
        </a>
        <a href="packing.html" class="card card-body flex flex-col items-center gap-1" style="cursor:pointer;text-align:center">
          <div style="font-size:2rem">🧳</div>
          <div style="font-weight:600">Packing List</div>
          <div class="text-muted text-sm">Never forget essentials</div>
        </a>
        <a href="notes.html" class="card card-body flex flex-col items-center gap-1" style="cursor:pointer;text-align:center">
          <div style="font-size:2rem">📝</div>
          <div style="font-weight:600">Trip Notes</div>
          <div class="text-muted text-sm">Journal & reminders</div>
        </a>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>
<script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/ui.js"></script>
<script>
auth.requireAuth();
document.getElementById('sidebar-mount').innerHTML = buildSidebar('dashboard');
const user = auth.getUser();
document.getElementById('greeting-sub').textContent = `Welcome back, ${user.name}! Let's plan something amazing.`;

async function loadDashboard() {
  try {
    // Stats
    const trips = await api.get('/trips');
    const upcoming = trips.filter(t => t.start_date && new Date(t.start_date) >= new Date());
    const totalBudget = trips.reduce((s, t) => s + parseFloat(t.total_budget || 0), 0);
    document.getElementById('stats-row').innerHTML = `
      <div class="stat-card"><div class="stat-icon orange"><i class="fa-solid fa-suitcase"></i></div><div><div class="stat-value">${trips.length}</div><div class="stat-label">Total Trips</div></div></div>
      <div class="stat-card"><div class="stat-icon cyan"><i class="fa-solid fa-calendar-check"></i></div><div><div class="stat-value">${upcoming.length}</div><div class="stat-label">Upcoming</div></div></div>
      <div class="stat-card"><div class="stat-icon green"><i class="fa-solid fa-wallet"></i></div><div><div class="stat-value">${fmtMoney(totalBudget)}</div><div class="stat-label">Total Budgeted</div></div></div>
      <div class="stat-card"><div class="stat-icon purple"><i class="fa-solid fa-location-dot"></i></div><div><div class="stat-value">${trips.reduce((s,t)=>s+parseInt(t.stop_count||0),0)}</div><div class="stat-label">Cities Planned</div></div></div>
    `;

    // Recent trips
    const recent = trips.slice(0, 4);
    document.getElementById('recent-trips').innerHTML = recent.length ? recent.map(t => `
      <a href="itinerary-view.html?id=${t.id}" class="card card-body flex items-center gap-2" style="cursor:pointer">
        <div style="font-size:1.8rem">✈️</div>
        <div style="flex:1">
          <div style="font-weight:700">${t.name}</div>
          <div class="text-muted text-sm">${fmtDate(t.start_date)} → ${fmtDate(t.end_date)} &nbsp;•&nbsp; ${t.stop_count} stops</div>
        </div>
        <span class="badge badge-orange">${fmtMoney(t.total_budget)}</span>
      </a>
    `).join('') : `<div class="card card-body text-muted" style="text-align:center"><p>No trips yet. <a href="create-trip.html" style="color:var(--primary)">Create your first!</a></p></div>`;

    // Popular cities
    const cities = await api.get('/cities/popular');
    document.getElementById('popular-cities').innerHTML = cities.slice(0,4).map(c => `
      <a href="city-search.html?id=${c.id}" class="card" style="overflow:hidden;cursor:pointer;display:block">
        <img src="${c.image_url}" alt="${c.name}" class="card-img" style="height:100px" referrerpolicy="no-referrer" onerror="this.src='https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=800'"/>
        <div style="padding:.75rem .875rem">
          <div style="font-weight:700;font-size:.9rem">${c.name}</div>
          <div class="text-muted text-xs">${c.country}</div>
        </div>
      </a>
    `).join('');
  } catch (e) { showToast(e.message, 'error'); }
}
loadDashboard();
</script>
</body>
</html>
