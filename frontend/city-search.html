<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>City Search – Traveloop</title>
<meta name="description" content="Discover cities around the world and add them to your travel plan."/>
<link rel="stylesheet" href="css/style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="page-wrap">
  <div id="sidebar-mount"></div>
  <main class="main-content page-enter">
    <div class="topbar">
      <div class="topbar-title">
        <h1>City Search 🌍</h1>
        <span class="topbar-sub">Discover destinations and add them to your trips</span>
      </div>
    </div>

    <!-- Search & filters -->
    <div class="card card-body mb-3">
      <div class="flex gap-2" style="flex-wrap:wrap;align-items:flex-end">
        <div style="flex:1;min-width:220px">
          <label class="form-label">Search City</label>
          <div class="search-bar"><i class="fa-solid fa-search"></i><input type="text" id="city-search" placeholder="e.g. Tokyo, Barcelona…" oninput="searchCities()"/></div>
        </div>
        <div style="min-width:160px">
          <label class="form-label">Region</label>
          <select id="region-filter" onchange="searchCities()">
            <option value="">🌐 All Regions</option>
            <option value="Europe">🇪🇺 Europe</option>
            <option value="Asia">🌏 Asia</option>
            <option value="South Asia">🇮🇳 South Asia</option>
            <option value="North America">🌎 North America</option>
            <option value="Oceania">🦘 Oceania</option>
            <option value="Middle East">🕌 Middle East</option>
            <option value="Europe/Asia">🌍 Europe / Asia</option>
          </select>
        </div>
      </div>
    </div>

    <div id="cities-grid" class="grid grid-3"></div>
  </main>
</div>

<!-- City detail modal -->
<div class="modal-overlay" id="city-modal">
  <div class="modal" style="max-width:620px">
    <div class="modal-header">
      <h3 id="modal-city-name"></h3>
      <button class="modal-close" onclick="closeCityModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <img id="modal-city-img" referrerpolicy="no-referrer" style="width:100%;height:200px;object-fit:cover;border-radius:var(--radius);margin-bottom:1rem"/>
    <p id="modal-city-desc" class="text-muted mb-2"></p>
    <div class="flex gap-2 mb-3" id="modal-city-badges"></div>
    <h4 class="mb-2">Popular Activities</h4>
    <div id="modal-activities" class="flex flex-col gap-1"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeCityModal()">Close</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/ui.js"></script>
<script>
auth.requireAuth();
document.getElementById('sidebar-mount').innerHTML = buildSidebar('cities');
const typeIcons={sightseeing:'🏛️',food:'🍽️',adventure:'🏔️',culture:'🎭',shopping:'🛍️',nightlife:'🌙',nature:'🌿'};

async function searchCities(){
  const q=document.getElementById('city-search').value;
  const r=document.getElementById('region-filter').value;
  try{
    const cities=await api.get(`/cities?search=${encodeURIComponent(q)}&region=${encodeURIComponent(r)}`);
    renderCities(cities);
  } catch(e){ showToast(e.message,'error'); }
}

function renderCities(cities){
  const g=document.getElementById('cities-grid');
  if(!cities.length){ g.innerHTML='<p class="text-muted" style="grid-column:1/-1">No cities found. Try a different search.</p>'; return; }
  g.innerHTML=cities.map(c=>`
    <div class="card" style="overflow:hidden;cursor:pointer" onclick="openCityModal(${c.id})">
      <img src="${c.image_url||''}" alt="${c.name}" class="card-img" referrerpolicy="no-referrer" onerror="this.src='https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=800'"/>
      <div class="card-body">
        <h3>${c.name}</h3>
        <div class="text-muted text-sm mb-2">${c.country} • ${c.region||''}</div>
        <div class="flex gap-1">
          <span class="badge badge-orange">💲 Index ${c.cost_index}</span>
          <span class="badge badge-cyan">⭐ ${c.popularity}%</span>
        </div>
        <p class="text-muted text-sm mt-2" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${c.description||''}</p>
      </div>
    </div>`).join('');
}

async function openCityModal(id){
  try{
    const cities=await api.get(`/cities?search=`);
    const c=cities.find(x=>x.id===id);
    if(!c) return;
    document.getElementById('modal-city-name').textContent=`${c.name}, ${c.country}`;
    document.getElementById('modal-city-img').src=c.image_url||'';
    document.getElementById('modal-city-desc').textContent=c.description||'';
    document.getElementById('modal-city-badges').innerHTML=`
      <span class="badge badge-orange">💲 Cost Index ${c.cost_index}</span>
      <span class="badge badge-cyan">⭐ Popularity ${c.popularity}%</span>
      <span class="badge badge-purple">🌍 ${c.region||c.country}</span>`;
    const acts=await api.get(`/cities/${id}/activities`);
    document.getElementById('modal-activities').innerHTML=acts.length?acts.map(a=>`
      <div style="display:flex;align-items:center;gap:.75rem;padding:.6rem .75rem;background:var(--bg3);border-radius:var(--radius-sm)">
        <span style="font-size:1.1rem">${typeIcons[a.type]||'📌'}</span>
        <div style="flex:1"><div style="font-weight:600;font-size:.9rem">${a.name}</div>
        <div class="text-muted text-xs">${a.duration} min • ₹${parseFloat(a.cost||0).toFixed(2)}</div></div>
      </div>`).join(''):'<p class="text-muted text-sm">No activities listed</p>';
    document.getElementById('city-modal').classList.add('open');
  } catch(e){ showToast(e.message,'error'); }
}
function closeCityModal(){ document.getElementById('city-modal').classList.remove('open'); }
searchCities();
</script>
</body>
</html>
