<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Itinerary Builder – Traveloop</title>
<meta name="description" content="Build your day-by-day travel itinerary with stops and activities."/>
<link rel="stylesheet" href="css/style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
.stop-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:1rem; overflow:hidden; }
.stop-header { background:linear-gradient(135deg,rgba(249,115,22,.12),rgba(6,182,212,.08)); padding:1rem 1.25rem; display:flex; align-items:center; gap:.75rem; }
.stop-body { padding:1rem 1.25rem; }
.activity-row { display:flex; align-items:center; gap:.75rem; padding:.6rem .75rem; background:var(--bg3); border-radius:var(--radius-sm); margin-bottom:.5rem; }
.act-type-dot { width:10px;height:10px;border-radius:50%;flex-shrink:0; }
</style>
</head>
<body>
<div class="page-wrap">
  <div id="sidebar-mount"></div>
  <main class="main-content page-enter">
    <div class="topbar">
      <div class="topbar-title">
        <h1 id="trip-name-title">Itinerary Builder 🗺️</h1>
        <span class="topbar-sub">Add cities and activities to build your plan</span>
      </div>
      <div class="topbar-actions">
        <a href="#" id="view-link" class="btn btn-secondary"><i class="fa-solid fa-eye"></i> Preview</a>
        <button class="btn btn-primary" onclick="openAddStop()"><i class="fa-solid fa-plus"></i> Add Stop</button>
      </div>
    </div>

    <div id="stops-container"></div>
    <div id="empty-stops" class="card card-body hidden" style="text-align:center;padding:3rem">
      <div style="font-size:3rem">📍</div>
      <h3 class="mt-2">No stops yet</h3>
      <p class="text-muted mt-1 mb-3">Add your first city to start building the itinerary</p>
      <button class="btn btn-primary" onclick="openAddStop()"><i class="fa-solid fa-plus"></i> Add First Stop</button>
    </div>
  </main>
</div>

<!-- Add Stop Modal -->
<div class="modal-overlay" id="stop-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Add City Stop</h3>
      <button class="modal-close" onclick="closeStopModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="flex flex-col gap-2">
      <div class="form-group"><label class="form-label">City *</label><input id="stop-city" placeholder="e.g. Paris" required/></div>
      <div class="form-group"><label class="form-label">Country</label><input id="stop-country" placeholder="e.g. France"/></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Arrival</label><input type="date" id="stop-arrival"/></div>
        <div class="form-group"><label class="form-label">Departure</label><input type="date" id="stop-departure"/></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeStopModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveStop()"><i class="fa-solid fa-floppy-disk"></i> Add Stop</button>
    </div>
  </div>
</div>

<!-- Add Activity Modal -->
<div class="modal-overlay" id="act-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Add Activity</h3>
      <button class="modal-close" onclick="closeActModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="flex flex-col gap-2">
      <div class="form-group"><label class="form-label">Activity Name *</label><input id="act-name" placeholder="e.g. Visit Eiffel Tower" required/></div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Type</label>
          <select id="act-type">
            <option value="sightseeing">🏛️ Sightseeing</option>
            <option value="food">🍽️ Food</option>
            <option value="adventure">🏔️ Adventure</option>
            <option value="culture">🎭 Culture</option>
            <option value="shopping">🛍️ Shopping</option>
            <option value="nightlife">🌙 Nightlife</option>
            <option value="nature">🌿 Nature</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Cost ($)</label><input type="number" id="act-cost" placeholder="0" min="0"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Duration (mins)</label><input type="number" id="act-duration" placeholder="60" min="1"/></div>
        <div class="form-group"><label class="form-label">Time</label><input type="time" id="act-time"/></div>
      </div>
      <div class="form-group"><label class="form-label">Description</label><textarea id="act-desc" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeActModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveActivity()"><i class="fa-solid fa-floppy-disk"></i> Add Activity</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/ui.js"></script>
<script>
auth.requireAuth();
document.getElementById('sidebar-mount').innerHTML = buildSidebar('');
const tripId = getParam('id');
if (!tripId) window.location.href = 'my-trips.html';
document.getElementById('view-link').href = `itinerary-view.html?id=${tripId}`;
let stops = [], currentStopId = null;

const typeColors = { sightseeing:'#F97316',food:'#10B981',adventure:'#EF4444',culture:'#8B5CF6',shopping:'#06B6D4',nightlife:'#F59E0B',nature:'#22C55E' };

async function load() {
  try {
    const trip = await api.get(`/trips/${tripId}`);
    document.getElementById('trip-name-title').textContent = trip.name + ' 🗺️';
    stops = await api.get(`/stops?trip_id=${tripId}`);
    render();
  } catch (e) { showToast(e.message, 'error'); }
}

function render() {
  const c = document.getElementById('stops-container');
  const emp = document.getElementById('empty-stops');
  if (!stops.length) { c.innerHTML=''; emp.classList.remove('hidden'); return; }
  emp.classList.add('hidden');
  c.innerHTML = stops.map((s,i) => `
    <div class="stop-card">
      <div class="stop-header">
        <div style="background:var(--primary);color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0">${i+1}</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:1.05rem">${s.city}${s.country?', '+s.country:''}</div>
          <div class="text-muted text-sm">${fmtDate(s.arrival_date)} → ${fmtDate(s.departure_date)}</div>
        </div>
        <button onclick="deleteStop(${s.id})" class="btn btn-ghost btn-sm btn-icon"><i class="fa-solid fa-trash" style="color:var(--red)"></i></button>
      </div>
      <div class="stop-body">
        ${(s.activities||[]).map(a=>`
          <div class="activity-row">
            <div class="act-type-dot" style="background:${typeColors[a.type]||'#ccc'}"></div>
            <div style="flex:1">
              <div style="font-weight:600;font-size:.9rem">${a.name}</div>
              <div class="text-muted text-xs">${a.time_of_day||''} • ${a.duration||60} min • ${fmtMoney(a.cost)}</div>
            </div>
            <button onclick="deleteActivity(${a.id},${s.id})" class="btn btn-ghost btn-sm btn-icon"><i class="fa-solid fa-xmark" style="color:var(--red)"></i></button>
          </div>`).join('')}
        <button class="btn btn-secondary btn-sm mt-1" onclick="openAddActivity(${s.id})"><i class="fa-solid fa-plus"></i> Add Activity</button>
      </div>
    </div>`).join('');
}

function openAddStop() { document.getElementById('stop-modal').classList.add('open'); }
function closeStopModal() { document.getElementById('stop-modal').classList.remove('open'); }
async function saveStop() {
  const city = document.getElementById('stop-city').value.trim();
  if (!city) return showToast('City is required','error');
  try {
    const s = await api.post('/stops',{ trip_id:tripId,city,country:document.getElementById('stop-country').value,arrival_date:document.getElementById('stop-arrival').value||null,departure_date:document.getElementById('stop-departure').value||null,order_index:stops.length });
    s.activities = []; stops.push(s); render(); closeStopModal(); showToast('Stop added','success');
    document.getElementById('stop-city').value=''; document.getElementById('stop-country').value='';
  } catch(e){ showToast(e.message,'error'); }
}
async function deleteStop(id) {
  try { await api.delete(`/stops/${id}`); stops=stops.filter(s=>s.id!==id); render(); showToast('Stop removed','success'); }
  catch(e){ showToast(e.message,'error'); }
}
function openAddActivity(stopId) { currentStopId=stopId; document.getElementById('act-modal').classList.add('open'); }
function closeActModal() { document.getElementById('act-modal').classList.remove('open'); }
async function saveActivity() {
  const name=document.getElementById('act-name').value.trim();
  if(!name) return showToast('Activity name required','error');
  try {
    const a=await api.post('/activities',{ stop_id:currentStopId,name,type:document.getElementById('act-type').value,cost:document.getElementById('act-cost').value||0,duration:document.getElementById('act-duration').value||60,description:document.getElementById('act-desc').value,time_of_day:document.getElementById('act-time').value||null });
    const s=stops.find(x=>x.id===currentStopId); if(s){ if(!s.activities)s.activities=[]; s.activities.push(a); }
    render(); closeActModal(); showToast('Activity added','success');
    document.getElementById('act-name').value=''; document.getElementById('act-cost').value=''; document.getElementById('act-desc').value='';
  } catch(e){ showToast(e.message,'error'); }
}
async function deleteActivity(actId, stopId) {
  try { await api.delete(`/activities/${actId}`); const s=stops.find(x=>x.id===stopId); if(s) s.activities=s.activities.filter(a=>a.id!==actId); render(); showToast('Activity removed','success'); }
  catch(e){ showToast(e.message,'error'); }
}
load();
</script>
</body>
</html>
